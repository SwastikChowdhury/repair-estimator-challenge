  /* ============================================================= */
  /* EVENTS — single delegated listener on the app root             */
  /* ============================================================= */
  async function handleAction(action, target) {
    const p = activeProject();

    switch (action) {
      /* ----- Projects ----- */
      case 'open-projects':
        openProjectsSheet();
        break;
      case 'new-project':
        openNewProjectSheet();
        break;
      case 'switch-project':
        setActiveProject(target.dataset.id);
        closeSheet();
        render();
        break;
      case 'rename-project': {
        const id = target.dataset.id;
        const proj = state.projects[id];
        const name = await promptText({ title: 'Rename project', label: 'Project name', value: proj.name, ok: 'Save' });
        if (name) { proj.name = name; touch(proj); saveNow(); render(); openProjectsSheet(); }
        break;
      }
      case 'edit-notes':
        openNotesSheet(target.dataset.id);
        break;
      case 'delete-project': {
        const id = target.dataset.id;
        const proj = state.projects[id];
        const ok = await confirmDialog({ title: 'Delete project?', message: 'Delete “' + proj.name + '” and all its data? This cannot be undone.', ok: 'Delete', danger: true });
        if (ok) { deleteProject(id); render(); openProjectsSheet(); }
        break;
      }

      /* ----- Rooms ----- */
      case 'select-room':
        state.ui.activeRoomId = target.dataset.room;
        render();
        break;
      case 'add-room':
        openRoomTypeSheet();
        break;
      case 'add-room-type': {
        const room = addRoom(p, target.dataset.type);
        state.ui.activeRoomId = room.id;
        saveNow();
        closeSheet();
        render();
        break;
      }
      case 'rename-room': {
        const room = p.rooms.find(function (r) { return r.id === target.dataset.room; });
        const label = await promptText({ title: 'Rename room', label: 'Room name', value: room.label, ok: 'Save' });
        if (label) { room.label = label; touch(p); saveNow(); render(); }
        break;
      }
      case 'remove-room': {
        const room = p.rooms.find(function (r) { return r.id === target.dataset.room; });
        const ok = await confirmDialog({ title: 'Remove room?', message: 'Remove “' + room.label + '” and its selections?', ok: 'Remove', danger: true });
        if (ok) {
          removeRoom(p, room.id);
          if (state.ui.activeRoomId === room.id) state.ui.activeRoomId = p.rooms.length ? p.rooms[0].id : null;
          saveNow();
          render();
        }
        break;
      }

      /* ----- Walkthrough: groups & items ----- */
      case 'toggle-group': {
        const key = selKey(target.dataset.room, target.dataset.group);
        const idx = groupsForRoom(p.rooms.find(function (r) { return r.id === target.dataset.room; }))
          .findIndex(function (g) { return g.id === target.dataset.group; });
        const currentlyOpen = isGroupExpanded(target.dataset.room, target.dataset.group, idx);
        state.ui.expandedGroups[key] = !currentlyOpen;
        render({ preserveScroll: true });
        break;
      }
      case 'toggle-item': {
        const roomId = target.dataset.room, itemId = target.dataset.item, groupId = target.dataset.group;
        const room = p.rooms.find(function (r) { return r.id === roomId; });
        const sel = ensureSel(p, roomId, itemId);
        sel.checked = !sel.checked;
        if (sel.checked) {
          if (sel.qty == null) {
            // Pre-fill from the sqft suggestion when available; else default 1.
            const sug = suggestedQty(p, room, itemId);
            sel.qty = sug != null ? sug : 1;
            sel.qtySuggested = sug != null;
          }
          // Checking a real item clears this group's "No action needed" flag.
          const na = getSel(p, roomId, naItemId(groupId));
          if (na) na.checked = false;
        }
        touch(p);
        scheduleSave();
        render({ preserveScroll: true });
        if (sel.checked) {
          const q = document.querySelector('.qty[data-room="' + roomId + '"][data-item="' + itemId + '"]');
          if (q) q.focus();
        }
        break;
      }
      case 'toggle-noaction': {
        const roomId = target.dataset.room, groupId = target.dataset.group;
        const room = p.rooms.find(function (r) { return r.id === roomId; });
        const group = groupsForRoom(room).find(function (g) { return g.id === groupId; });
        const na = ensureSel(p, roomId, naItemId(groupId));
        na.checked = !na.checked;
        if (na.checked) {
          // Marking a group "no action" clears its items so its subtotal is truly $0.
          groupItemIds(p, roomId, group).forEach(function (id) {
            const s = getSel(p, roomId, id);
            if (s) s.checked = false;
          });
        }
        touch(p);
        scheduleSave();
        render({ preserveScroll: true });
        break;
      }
      case 'age-add': {
        const roomId = target.dataset.room, itemId = target.dataset.item;
        const sel = ensureSel(p, roomId, itemId);
        sel.checked = true;
        if (sel.qty == null) sel.qty = 1;
        sel.qtySuggested = false;
        // Clear "No action needed" on the item's group so it counts as reviewed.
        const room = p.rooms.find(function (r) { return r.id === roomId; });
        const grp = groupsForRoom(room).find(function (g) { return g.items.indexOf(itemId) >= 0; });
        if (grp) { const na = getSel(p, roomId, naItemId(grp.id)); if (na) na.checked = false; }
        touch(p); scheduleSave(); render({ preserveScroll: true });
        break;
      }
      case 'open-dealguard':
        openDealGuardSheet();
        break;
      case 'edit-cost':
        openCostSheet(p, target.dataset.room, target.dataset.item);
        break;
      case 'add-custom':
        openCustomSheet(p, target.dataset.room, target.dataset.group);
        break;
      case 'delete-custom': {
        const roomId = target.dataset.room, itemId = target.dataset.item;
        const custom = findCustomItem(p, roomId, itemId);
        const ok = await confirmDialog({ title: 'Delete item?', message: 'Delete “' + (custom ? custom.name : 'this item') + '”?', ok: 'Delete', danger: true });
        if (ok) {
          p.customItems = p.customItems.filter(function (c) { return !(c.roomId === roomId && c.id === itemId); });
          delete p.selections[selKey(roomId, itemId)];
          delete p.photos[selKey(roomId, itemId)];
          touch(p);
          scheduleSave();
          render({ preserveScroll: true });
        }
        break;
      }
      case 'hide-item': {
        const roomId = target.dataset.room, itemId = target.dataset.item;
        const k = selKey(roomId, itemId);
        if (p.removedItemIds.indexOf(k) < 0) p.removedItemIds.push(k);
        delete p.selections[k]; // hidden items don't linger in totals
        touch(p);
        scheduleSave();
        render({ preserveScroll: true });
        break;
      }
      case 'restore-hidden': {
        const roomId = target.dataset.room, groupId = target.dataset.group;
        const room = p.rooms.find(function (r) { return r.id === roomId; });
        const group = groupsForRoom(room).find(function (g) { return g.id === groupId; });
        const groupKeys = group.items.map(function (id) { return selKey(roomId, id); });
        p.removedItemIds = p.removedItemIds.filter(function (k) { return groupKeys.indexOf(k) < 0; });
        touch(p);
        scheduleSave();
        render({ preserveScroll: true });
        break;
      }

      /* ----- Sheet / overlay ----- */
      case 'sheet-close':
        closeSheet();
        render({ preserveScroll: true });
        break;

      /* ----- Photos ----- */
      case 'open-photos':
        openPhotosSheet('project');
        break;
      case 'item-photos':
        openPhotosSheet(selKey(target.dataset.room, target.dataset.item));
        break;
      case 'add-photo': {
        const key = target.dataset.key;
        addPhotoFlow(p, key, function () { openPhotosSheet(key); });
        break;
      }
      case 'del-photo': {
        const key = target.dataset.key;
        const idx = parseInt(target.dataset.idx, 10);
        if (p.photos[key]) {
          p.photos[key].splice(idx, 1);
          if (!p.photos[key].length) delete p.photos[key];
          touch(p);
          saveNow();
        }
        openPhotosSheet(key);
        break;
      }
      case 'scan-serial':
        scanSerial(target, target.dataset.key, parseInt(target.dataset.idx, 10));
        break;

      /* ----- Settings ----- */
      case 'open-settings':
        openSettingsSheet();
        break;
      case 'reset-prices': {
        const ok = await confirmDialog({ title: 'Reset prices?', message: 'Clear all global price edits and return to catalog defaults?', ok: 'Reset', danger: true });
        if (ok) { state.globalPriceOverrides = {}; saveNow(); openSettingsSheet(); toast('Prices reset to catalog defaults.'); }
        break;
      }
      case 'reset-all': {
        const ok = await confirmDialog({ title: 'Reset all data?', message: 'Delete every project, photo, and price edit. This cannot be undone.', ok: 'Delete everything', danger: true });
        if (ok) {
          localStorage.removeItem(SK_DATA);
          localStorage.removeItem(SK_PRICES);
          state.projects = {};
          state.activeProjectId = null;
          state.globalPriceOverrides = {};
          state.ui.expandedGroups = {};
          lastHero = 0;
          seedIfEmpty();
          const np = activeProject();
          state.ui.activeRoomId = np && np.rooms.length ? np.rooms[0].id : null;
          closeSheet();
          render();
          toast('All data reset.');
        }
        break;
      }
      case 'export': {
        // Pre-export big-ticket guard: warn if major systems are unreviewed.
        const unrev = unreviewedCritical(p);
        if (unrev.length) {
          const go = await confirmDialog({
            title: 'Big-ticket items not reviewed',
            message: 'These major systems are still unreviewed: ' + unrev.join(', ') + '. They usually drive the largest costs. Export anyway?',
            ok: 'Export anyway',
            cancel: 'Go back',
            danger: true,
          });
          if (!go) break;
        }
        await exportProject(p);
        break;
      }
    }
  }

  function installEventDelegation() {
    document.body.addEventListener('click', function (e) {
      const actEl = e.target.closest('[data-action]');
      if (!actEl) return;
      const action = actEl.dataset.action;
      // Backdrop click closes the sheet (but clicks inside the sheet don't).
      if (action === 'overlay-backdrop') {
        if (e.target === el.overlay) closeSheet();
        return;
      }
      // These are handled by their own sheet-local listeners.
      if (/^(prompt|confirm|cost|ci|np|notes)-/.test(action)) return;
      // Whole-row tap toggles the item, but taps on its interactive parts
      // (qty/serial/year inputs, cost, delete, photos, age-add, scan) do their own thing.
      if (action === 'toggle-item' &&
          e.target.closest('input, .unit, .item__x, .pill, .agewarn__add, .qtyblock, .ocr-btn')) return;
      handleAction(action, actEl);
    });

    // HOT PATH: qty typing updates totals via targeted DOM writes only.
    document.body.addEventListener('input', function (e) {
      const t = e.target;
      if (!t.classList) return;

      if (t.classList.contains('qty')) {
        const p = activeProject();
        if (!p) return;
        const roomId = t.dataset.room, itemId = t.dataset.item;
        const room = p.rooms.find(function (r) { return r.id === roomId; });
        const sel = ensureSel(p, roomId, itemId);
        const raw = sanitizeDecimal(t);
        sel.qty = raw === '' ? null : Math.max(0, parseFloat(raw) || 0);
        sel.qtySuggested = false; // user has taken ownership of this quantity
        touch(p);
        refreshTotalsAfterQty(p, room, itemId);
        scheduleSave();
        return;
      }

      // Global default price edit (Settings) — applies live across all projects.
      if (t.classList.contains('price-input')) {
        const id = t.dataset.priceid;
        const raw = sanitizeDecimal(t);
        if (raw === '') { delete state.globalPriceOverrides[id]; }
        else { state.globalPriceOverrides[id] = Math.max(0, parseFloat(raw) || 0); }
        scheduleSave();
        return;
      }

      // Deal Guard ARV — live-update the panel + bar via targeted writes.
      if (t.id === 'arv-input') {
        const p = activeProject();
        if (!p) return;
        const raw = sanitizeDecimal(t);
        p.meta.arv = raw === '' ? null : Math.max(0, parseFloat(raw) || 0);
        touch(p);
        refreshDealGuardDom();
        scheduleSave();
        return;
      }

      // Year field: keep only digits while typing (value is committed on change).
      if (t.classList.contains('year-input')) {
        sanitizeDigits(t);
        return;
      }

      // Photo caption — save (debounced) to the photo object.
      if (t.classList.contains('photo-caption')) {
        const p = activeProject();
        if (!p) return;
        const key = t.dataset.captionKey, idx = parseInt(t.dataset.idx, 10);
        const arr = p.photos[key];
        if (arr && arr[idx]) {
          arr[idx].caption = t.value;
          touch(p);
          scheduleSave();
        }
        return;
      }

      // Equipment serial number — save (debounced) to the selection.
      if (t.classList.contains('serial-input')) {
        const p = activeProject();
        if (!p) return;
        const sel = ensureSel(p, t.dataset.room, t.dataset.item);
        const raw = t.value.trim();
        sel.serial = raw === '' ? null : raw;
        touch(p);
        scheduleSave();
        return;
      }
    });

    document.body.addEventListener('change', function (e) {
      const t = e.target;

      // CSV price re-upload (Settings). File inputs fire 'change', not 'input'.
      if (t.id === 'csv-input') {
        const file = t.files && t.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function () { applyCsvPrices(String(reader.result || '')); };
        reader.onerror = function () { toast('Could not read that file.', 'error'); };
        reader.readAsText(file);
        return;
      }

      // Equipment install year — handled on change (blur) so the age flag
      // appears/disappears without blurring the field mid-typing.
      if (t.classList && t.classList.contains('year-input')) {
        const p = activeProject();
        if (!p) return;
        const roomId = t.dataset.room, itemId = t.dataset.item;
        const sel = ensureSel(p, roomId, itemId);
        const raw = sanitizeDigits(t);
        const yr = parseInt(raw, 10);
        sel.year = (raw === '' || isNaN(yr)) ? null : yr;
        touch(p);
        saveNow();
        render({ preserveScroll: true });
        return;
      }
    });

    // Enter acts as "Done" in the numeric fields — blur to dismiss the keyboard.
    document.body.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      const t = e.target;
      if (t && t.classList && (t.classList.contains('qty') ||
          t.classList.contains('price-input') || t.classList.contains('year-input') ||
          t.id === 'arv-input' || t.id === 'cost-input' || t.classList.contains('serial-input'))) {
        e.preventDefault();
        t.blur();
      }
    });
  }

  /* ----- Price override + custom item sheets ----- */
  function openCostSheet(project, roomId, itemId) {
    const meta = itemMeta(project, roomId, itemId);
    const custom = findCustomItem(project, roomId, itemId);
    const base = custom ? custom.cost : (ITEM_BY_ID[itemId] ? ITEM_BY_ID[itemId].cost : 0);
    const globalOv = state.globalPriceOverrides[itemId];
    const defaultCost = globalOv != null ? globalOv : base;
    const current = effectiveCost(project, roomId, itemId);
    openSheet([
      '<h2 class="sheet__title">', esc(meta.name), '</h2>',
      '<label class="sheet__label">Unit cost (this project only) · per ', esc(meta.unit || 'unit'), '</label>',
      '<input class="field tnum" id="cost-input" type="text" inputmode="decimal" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" value="', esc(current), '" />',
      '<p class="hint" style="margin:-8px 0 16px">Catalog default: ', unitMoney(defaultCost), '</p>',
      '<div class="sheet__actions">',
        '<button class="btn btn--ghost tap" data-action="cost-reset">Reset to default</button>',
        '<button class="btn btn--primary tap" data-action="cost-save">Save</button>',
      '</div>',
    ].join(''));
    const input = document.getElementById('cost-input');
    input.focus();
    function finish() { el.sheet.removeEventListener('click', onClick); closeSheet(); }
    function onClick(e) {
      const act = e.target.closest('[data-action]');
      if (!act) return;
      if (act.dataset.action === 'cost-save') {
        const val = parseFloat(input.value);
        const v = Math.max(0, val);
        const sel = ensureSel(project, roomId, itemId);
        // Only record an override when it actually differs from the effective default.
        sel.unitCostOverride = (isNaN(val) || v === defaultCost) ? null : v;
        touch(project); saveNow(); finish(); render({ preserveScroll: true });
      } else if (act.dataset.action === 'cost-reset') {
        const sel = getSel(project, roomId, itemId);
        if (sel) sel.unitCostOverride = null;
        touch(project); saveNow(); finish(); render({ preserveScroll: true });
      }
    }
    el.sheet.addEventListener('click', onClick);
    sheetCleanup = function () { el.sheet.removeEventListener('click', onClick); };
  }

  function openCustomSheet(project, roomId, groupId) {
    openSheet([
      '<h2 class="sheet__title">Add custom item</h2>',
      '<label class="sheet__label">Item name</label>',
      '<input class="field" id="ci-name" type="text" placeholder="e.g. Chimney rebuild" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" />',
      '<label class="sheet__label">Unit cost</label>',
      '<input class="field tnum" id="ci-cost" type="text" inputmode="decimal" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" placeholder="0" />',
      '<label class="sheet__label">Unit</label>',
      '<input class="field" id="ci-unit" type="text" placeholder="e.g. ea. / sqft / flat" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" />',
      '<div class="sheet__actions">',
        '<button class="btn btn--ghost tap" data-action="ci-cancel">Cancel</button>',
        '<button class="btn btn--primary tap" data-action="ci-save">Add item</button>',
      '</div>',
    ].join(''));
    document.getElementById('ci-name').focus();
    function finish() { el.sheet.removeEventListener('click', onClick); closeSheet(); }
    function onClick(e) {
      const act = e.target.closest('[data-action]');
      if (!act) return;
      if (act.dataset.action === 'ci-cancel') { finish(); return; }
      if (act.dataset.action === 'ci-save') {
        const name = document.getElementById('ci-name').value.trim();
        const cost = parseFloat(document.getElementById('ci-cost').value) || 0;
        const unit = document.getElementById('ci-unit').value.trim() || 'ea.';
        if (!name) { document.getElementById('ci-name').focus(); return; }
        const id = genId('c');
        project.customItems.push({ id: id, roomId: roomId, groupId: groupId, name: name, cost: cost, unit: unit });
        // The user explicitly added it, so start it checked at qty 1.
        project.selections[selKey(roomId, id)] = { checked: true, qty: 1, unitCostOverride: null, year: null };
        touch(project); saveNow(); finish(); render({ preserveScroll: true });
      }
    }
    el.sheet.addEventListener('click', onClick);
    sheetCleanup = function () { el.sheet.removeEventListener('click', onClick); };
  }

  /* ============================================================= */
  /* PHOTOS + SETTINGS                                              */
  /* ============================================================= */

  // Transient, visible status message — never lose data silently.
  function toast(msg, type) {
    const t = document.createElement('div');
    t.className = 'toast' + (type === 'error' ? ' toast--error' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function () { t.classList.add('toast--show'); });
    setTimeout(function () {
      t.classList.remove('toast--show');
      setTimeout(function () { t.remove(); }, 300);
    }, type === 'error' ? 4200 : 2000);
  }

  // ---- Capture + compression pipeline --------------------------------------
  // Android-safe: the file input must be in the DOM when .click() fires and
  // removed after the change event.
  function pickPhoto(onFile) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.setAttribute('capture', 'environment');
    input.style.position = 'fixed';
    input.style.left = '-9999px';
    document.body.appendChild(input);
    input.addEventListener('change', function () {
      const file = input.files && input.files[0];
      if (input.parentNode) input.parentNode.removeChild(input);
      if (file) onFile(file);
    }, { once: true });
    input.click();
  }

  // Downscale to a 1200px long edge and re-encode as JPEG q0.7 before storing.
  function compressImage(file) {
    return new Promise(function (resolve, reject) {
      const reader = new FileReader();
      reader.onload = function () {
        const img = new Image();
        img.onload = function () {
          const MAX = 1200;
          let w = img.naturalWidth || img.width;
          let h = img.naturalHeight || img.height;
          if (w >= h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
          else if (h > w && h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          try { resolve(canvas.toDataURL('image/jpeg', 0.7)); }
          catch (e) { reject(e); }
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // Store a compressed photo under a key; roll back + warn on quota failure.
  function storePhoto(project, key, dataUrl) {
    if (!project.photos[key]) project.photos[key] = [];
    project.photos[key].push({ dataUrl: dataUrl, ts: Date.now() });
    touch(project);
    if (!saveNow()) {
      // Roll back the in-memory push so UI and storage stay consistent.
      project.photos[key].pop();
      if (!project.photos[key].length) delete project.photos[key];
      toast('Storage full — photo not saved. Delete photos or reset data in Settings.', 'error');
      return false;
    }
    return true;
  }

  function addPhotoFlow(project, key, onDone) {
    pickPhoto(function (file) {
      compressImage(file).then(function (dataUrl) {
        if (storePhoto(project, key, dataUrl)) onDone();
      }).catch(function () {
        toast('Could not process that image.', 'error');
      });
    });
  }

  function photoCount(project, key) {
    return (project.photos[key] || []).length;
  }

  // Derive a human title for a photo key ('project' or 'roomId:itemId').
  function photoKeyTitle(project, key) {
    if (key === 'project') return 'Project photos';
    const idx = key.indexOf(':');
    const roomId = key.slice(0, idx);
    const itemId = key.slice(idx + 1);
    return itemMeta(project, roomId, itemId).name;
  }

  function openPhotosSheet(key) {
    const p = activeProject();
    const photos = p.photos[key] || [];
    const canScan = isSerialItem(photoKeyItemId(key));
    const grid = photos.length
      ? '<div class="thumbs">' + photos.map(function (ph, i) {
          return '<div class="photo-cell">' +
            '<div class="thumb"><img src="' + ph.dataUrl + '" alt="" />' +
              '<button class="thumb__del tap" data-action="del-photo" data-key="' + esc(key) + '" data-idx="' + i + '" aria-label="Delete photo">×</button></div>' +
            '<input class="photo-caption" type="text" value="' + esc(ph.caption || '') + '" ' +

  // ---- Storage meter -------------------------------------------------------
  function storageBytes() {
    let total = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      const v = localStorage.getItem(k) || '';
      total += (k.length + v.length) * 2; // UTF-16 ≈ 2 bytes/char
    }
    return total;
  }
  const STORAGE_CAP = 5 * 1024 * 1024; // iOS localStorage cap ≈ 5MB
  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / (1024 * 1024)).toFixed(2) + ' MB';
  }

  // ---- CSV price re-upload -------------------------------------------------
  // Minimal RFC-4180-ish parser (item names contain commas, so we honor quotes).
  function parseCSV(text) {
    const rows = []; let row = []; let field = ''; let inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQ) {
        if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
        else field += c;
      } else if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') { field += c; }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function applyCsvPrices(text) {
    const rows = parseCSV(text).filter(function (r) { return r.length && r.join('').trim(); });
    if (!rows.length) { toast('That CSV looks empty.', 'error'); return; }
    const header = rows[0].map(function (h) { return h.trim().toLowerCase(); });
    const idIdx = header.indexOf('id');
    let costIdx = header.indexOf('cost');
    if (costIdx < 0) costIdx = header.indexOf('price');
    if (idIdx < 0 || costIdx < 0) {
      toast('CSV needs "id" and "cost" columns.', 'error');
      return;
    }
    let updated = 0;
    for (let r = 1; r < rows.length; r++) {
      const id = (rows[r][idIdx] || '').trim();
      const cost = parseFloat((rows[r][costIdx] || '').trim());
      if (ITEM_BY_ID[id] && !isNaN(cost) && cost >= 0) {
        state.globalPriceOverrides[id] = cost;
        updated++;
      }
    }
    saveNow();
    toast(updated + ' price' + (updated === 1 ? '' : 's') + ' updated across all projects.');
    openSettingsSheet();
  }

    const used = storageBytes();
    const pct = Math.min(100, Math.round((used / STORAGE_CAP) * 100));
    const meterClass = pct >= 85 ? 'meter__fill meter__fill--warn' : 'meter__fill';

    // Editable global default prices for every catalog item.
    const priceRows = REPAIR_ITEMS.map(function (it) {

            'value="', esc(val), '" data-priceid="', it.id, '" aria-label="Default cost for ', esc(it.name), '" />',

  function sanitizeName(s) {
    return String(s || 'estimate').replace(/[^a-z0-9]+/gi, '-').replace(/^-+|-+$/g, '').slice(0, 60) || 'estimate';
  }
  function dateStampLong(d) {
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }
  function dateStampFile(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // Snapshot of what to write per room (effective prices are captured now).
  function exportModel(project) {
    return project.rooms.map(function (room) {
      const groups = [];
      groupsForRoom(room).forEach(function (g) {
        const items = groupItemIds(project, room.id, g)
          .filter(function (id) { const s = getSel(project, room.id, id); return s && s.checked; })
          .map(function (id) {
            const meta = itemMeta(project, room.id, id);
            const cost = effectiveCost(project, room.id, id);
            const s = getSel(project, room.id, id);
            const qty = Number(s.qty) || 0;
            const serial = s.serial && String(s.serial).trim();
            const name = serial ? meta.name + ' — S/N ' + serial : meta.name;
            return { name: name, unit: meta.unit, cost: cost, qty: qty, total: qty * cost };
          });
        if (items.length) groups.push({ name: g.name, items: items });
      });
      return { label: room.label, groups: groups, total: roomTotal(project, room) };
    }).filter(function (r) { return r.groups.length; });
  }

  async function buildWorkbookBuffer(project) {
    const NAVY = 'FF121214', ACCENT = 'FFD55101', LIGHT = 'FFF3EAE1', GREY = 'FF5C6773', WHITE = 'FFFFFFFF', LINE = 'FFE4E1D9';
    const MONEY = '$#,##0.00', QTY = '#,##0.###';

    const wb = new ExcelJS.Workbook();
    wb.creator = 'Spark Homes Repair Estimator';
    wb.created = new Date();
    const ws = wb.addWorksheet('Estimate', { views: [{ showGridLines: false }] });

    ws.getColumn(1).width = 46; // Item
    ws.getColumn(2).width = 16; // Unit
    ws.getColumn(3).width = 14; // Unit Cost
    ws.getColumn(4).width = 10; // Qty
    ws.getColumn(5).width = 16; // Total

    function fill(cell, argb) { cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: argb } }; }
    function rightAlign(cell) { cell.alignment = { horizontal: 'right' }; }

    // ---- Title block ----
    ws.mergeCells('A1:E1');
    const t = ws.getCell('A1');
    t.value = project.name;
    t.font = { bold: true, size: 18, color: { argb: NAVY } };
    ws.getRow(1).height = 26;

    ws.mergeCells('A2:E2');
    const d = ws.getCell('A2');
    d.value = 'Repair estimate — ' + dateStampLong(new Date());
    d.font = { size: 11, color: { argb: GREY } };

    const m = project.meta;
    const metaParts = [];
    if (m.sqft) metaParts.push(Number(m.sqft).toLocaleString('en-US') + ' sqft');
    if (m.beds != null) metaParts.push(m.beds + ' bd');
    if (m.baths != null) metaParts.push(m.baths + ' ba');
    if (m.arv) metaParts.push('ARV ' + money(m.arv));
    ws.mergeCells('A3:E3');
    ws.getCell('A3').value = metaParts.join('   ·   ');
    ws.getCell('A3').font = { size: 11, color: { argb: GREY } };

    let r = 5;
    if (project.notes && project.notes.trim()) {
      ws.mergeCells('A' + r + ':E' + r);
      const nc = ws.getCell('A' + r);
      nc.value = 'Notes: ' + project.notes.trim();
      nc.font = { size: 11, italic: true, color: { argb: GREY } };
      nc.alignment = { wrapText: true, vertical: 'top' };
      ws.getRow(r).height = 32;
      r += 2;
    }
    const rooms = exportModel(project);

    rooms.forEach(function (room) {
      // Room header band
      ws.mergeCells('A' + r + ':E' + r);
      const rc = ws.getCell('A' + r);
      rc.value = room.label;
      rc.font = { bold: true, size: 13, color: { argb: WHITE } };
      fill(rc, NAVY);
      ws.getRow(r).height = 20;
      r++;

      // Column headers
      const hdr = ws.getRow(r);
      hdr.values = ['Item', 'Unit', 'Unit Cost', 'Qty', 'Total'];
      hdr.eachCell(function (c) {
        c.font = { bold: true, color: { argb: NAVY } };
        fill(c, LIGHT);
        c.border = { bottom: { style: 'thin', color: { argb: LINE } } };
      });
      rightAlign(hdr.getCell(3)); rightAlign(hdr.getCell(4)); rightAlign(hdr.getCell(5));
      r++;

      room.groups.forEach(function (g) {
        // Group subheader
        ws.mergeCells('A' + r + ':E' + r);
        const gc = ws.getCell('A' + r);
        gc.value = g.name;
        gc.font = { italic: true, bold: true, size: 11, color: { argb: GREY } };
        fill(gc, LIGHT);
        r++;

        g.items.forEach(function (it) {
          const row = ws.getRow(r);
          row.getCell(1).value = it.name;
          row.getCell(2).value = it.unit;
          row.getCell(3).value = it.cost; row.getCell(3).numFmt = MONEY; rightAlign(row.getCell(3));
          row.getCell(4).value = it.qty; row.getCell(4).numFmt = QTY; rightAlign(row.getCell(4));
          row.getCell(5).value = it.total; row.getCell(5).numFmt = MONEY; rightAlign(row.getCell(5));
          row.getCell(5).font = { bold: true };
          row.getCell(1).border = { bottom: { style: 'hair', color: { argb: LINE } } };
          r++;
        });
      });

      // Room subtotal
      ws.mergeCells('A' + r + ':D' + r);
      const sc = ws.getCell('A' + r);
      sc.value = room.label + ' subtotal';
      rightAlign(sc);
      sc.font = { bold: true, color: { argb: NAVY } };
      fill(sc, LIGHT);
      const stv = ws.getCell('E' + r);
      stv.value = room.total; stv.numFmt = MONEY; rightAlign(stv);
      stv.font = { bold: true, color: { argb: NAVY } };
      fill(stv, LIGHT);
      r += 2;
    });

    // ---- Grand total ----
    ws.mergeCells('A' + r + ':D' + r);
    const gt = ws.getCell('A' + r);
    gt.value = 'GRAND TOTAL';
    rightAlign(gt);
    gt.font = { bold: true, size: 14, color: { argb: WHITE } };
    fill(gt, ACCENT);
    const gtv = ws.getCell('E' + r);
    gtv.value = projectTotal(project); gtv.numFmt = MONEY; rightAlign(gtv);
    gtv.font = { bold: true, size: 14, color: { argb: WHITE } };
    fill(gtv, ACCENT);
    ws.getRow(r).height = 22;

    return wb.xlsx.writeBuffer();
  }

  // Add every stored photo to the zip's /photos folder with a readable name.
  function addPhotosToZip(project, folder) {
    Object.keys(project.photos).forEach(function (key) {
      const arr = project.photos[key] || [];
      // Fallback label from the room-item (or 'project') when a photo has no caption.
      let fallback;
      if (key === 'project') {
        fallback = 'project';
      } else {
        const c = key.indexOf(':');
        const roomId = key.slice(0, c), itemId = key.slice(c + 1);
        const room = project.rooms.find(function (rm) { return rm.id === roomId; });
        fallback = (room ? room.label : 'room') + '-' + itemMeta(project, roomId, itemId).name;
      }
      arr.forEach(function (ph, i) {
        const comma = ph.dataUrl.indexOf(',');
        const base64 = comma >= 0 ? ph.dataUrl.slice(comma + 1) : '';
        if (!base64) return;
        const label = sanitizeName((ph.caption && ph.caption.trim()) || fallback || 'project');
        folder.file(label + '-' + (i + 1) + '.jpg', base64, { base64: true });
      });
    });
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(function () { if (a.parentNode) a.parentNode.removeChild(a); URL.revokeObjectURL(url); }, 1500);
  }

  async function exportProject(project) {
    if (typeof ExcelJS === 'undefined' || typeof JSZip === 'undefined') {
      toast('Export libraries missing — add vendor/exceljs.min.js and vendor/jszip.min.js.', 'error');
      return;
    }
    toast('Building export…');
    try {
      const buffer = await buildWorkbookBuffer(project);
      const zip = new JSZip();
      zip.file('estimate.xlsx', buffer);
      // Always create the photos folder for a consistent bundle shape.
      const photos = zip.folder('photos');
      addPhotosToZip(project, photos);
      const blob = await zip.generateAsync({ type: 'blob' });
      downloadBlob(blob, sanitizeName(project.name) + '-' + dateStampFile(new Date()) + '.zip');
      toast('Export ready — check your downloads.');
    } catch (e) {
      console.error('Export failed', e);
      toast('Export failed: ' + (e && e.message ? e.message : 'unknown error'), 'error');
    }
  }

  /* ============================================================= */
  /* PWA — Phase 6                                                   */
  /* ============================================================= */
  /* (service worker registration lands in Phase 6) */

  /* ============================================================= */
  /* SERIAL OCR — lazy-loaded Tesseract; never blocks the app       */
  /* ============================================================= */
  // Nothing here loads until the first "Scan serial #" tap.
  let ocrScriptPromise = null; // resolves once tesseract.min.js is injected
  let ocrWorker = null;        // one cached worker for the whole session

  function loadTesseractScript() {
    if (typeof Tesseract !== 'undefined') return Promise.resolve();
    if (ocrScriptPromise) return ocrScriptPromise;
    ocrScriptPromise = new Promise(function (resolve, reject) {
      const s = document.createElement('script');
      s.src = './vendor-ocr/tesseract.min.js';
      s.onload = function () { resolve(); };
      s.onerror = function () { ocrScriptPromise = null; reject(new Error('Failed to load OCR engine')); };
      document.head.appendChild(s);
    });
    return ocrScriptPromise;
  }

  function getOcrWorker() {
    if (ocrWorker) return Promise.resolve(ocrWorker);
    return loadTesseractScript().then(function () {
      return Tesseract.createWorker('eng', 1, {
        workerPath: './vendor-ocr/worker.min.js',
        corePath: './vendor-ocr/',
        langPath: './vendor-ocr/',
        gzip: true,
      });
    }).then(function (w) { ocrWorker = w; return w; });
  }

  // Parse serial-shaped tokens from full OCR text (v7 LSTM has no data.words by default).
  function pickSerialFromText(text) {
    const tokens = (text || '').toUpperCase().split(/[^A-Z0-9\-\/]+/)
      .filter(function (t) { return /^[A-Z0-9][A-Z0-9\-\/]{4,19}$/.test(t); });
    const mixed = tokens.filter(function (t) { return /[A-Z]/.test(t) && /[0-9]/.test(t); });
    if (mixed.length) return mixed.reduce(function (a, b) { return a.length >= b.length ? a : b; });
    const digits = tokens.filter(function (t) { return /^[0-9]+$/.test(t) && t.length >= 6; });
    if (digits.length) return digits.reduce(function (a, b) { return a.length >= b.length ? a : b; });
    return null;
  }

  function focusSerialField(roomId, itemId) {
    const field = document.querySelector('.serial-input[data-room="' + roomId + '"][data-item="' + itemId + '"]');
    if (field) {
      try { field.scrollIntoView({ block: 'center' }); } catch (e) {}
      field.focus();
    }
  }

  function scanSerial(btn, key, idx) {
    const p = activeProject();
    if (!p || !btn || btn.dataset.busy === '1') return;
    const arr = p.photos[key] || [];
    const ph = arr[idx];
    if (!ph) return;
    const c = key.indexOf(':');
    if (c < 0) return;
    const roomId = key.slice(0, c), itemId = key.slice(c + 1);

    // Disable only this button; the rest of the app stays fully usable.
    btn.dataset.busy = '1';
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Scanning…';
    function restore() { btn.disabled = false; btn.textContent = originalText; btn.dataset.busy = ''; }

    const timeout = new Promise(function (_, reject) {
      setTimeout(function () { reject(new Error('timeout')); }, 25000);
    });
    const run = getOcrWorker().then(function (worker) {
      return worker.recognize(ph.dataUrl);
    });

    Promise.race([run, timeout]).then(function (result) {
      const data = result && result.data ? result.data : {};
      console.log('[OCR]', data.confidence, data.text);
      const candidate = pickSerialFromText(data.text);
      const conf = typeof data.confidence === 'number' ? data.confidence : 0;
      restore();
      if (conf < 40 || !candidate) {
        toast("Couldn't read a serial — enter it manually.", 'error');
        focusSerialField(roomId, itemId);
        return;
      }
      const sel = ensureSel(p, roomId, itemId);
      sel.serial = candidate;
      touch(p); saveNow();
      // Reflect on the row (it renders behind the open photos sheet).
      render({ preserveScroll: true });
      const field = document.querySelector('.serial-input[data-room="' + roomId + '"][data-item="' + itemId + '"]');
      if (field) field.value = candidate;
      toast('Serial detected — please verify');
    }).catch(function () {
      restore();
      toast('Scanner failed to load — check connection and retry.', 'error');
      focusSerialField(roomId, itemId);
    });
  }

  /* ============================================================= */
  /* BOOT                                                           */
  /* ============================================================= */
  // While the on-screen keyboard is open, the visual viewport shrinks; hide the
  // sticky bottom bars so they don't crowd the field being typed into.
  function installKeyboardHandling() {
    // Hide the sticky bottom bar only while the user is genuinely typing.
    // A live focus-driven flag (not a boot-time viewport snapshot) means an
    // emulator/browser resize with no field focused can't leave the bar stuck.
    let typing = false;
    let removeTimer = null;

    function updateKeyboardOpen() {
      const open = typing && window.visualViewport &&
        window.visualViewport.height < window.innerHeight - 140;
      document.body.classList.toggle('keyboard-open', open);
    }

    document.addEventListener('focusin', function (e) {
      const el = e.target;
      if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) return;
      typing = true;
      if (removeTimer) { clearTimeout(removeTimer); removeTimer = null; }
      updateKeyboardOpen();
      // When a list field gains focus, center it once the keyboard has settled.
      if (el.closest && el.closest('.list')) {
        setTimeout(function () {
          el.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }, 250);
      }
    });

    document.addEventListener('focusout', function (e) {
      const el = e.target;
      if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) return;
      typing = false;
      if (removeTimer) clearTimeout(removeTimer);
      removeTimer = setTimeout(function () {
        document.body.classList.remove('keyboard-open');
      }, 100);
    });

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateKeyboardOpen);
    }
  }

  function boot() {
    loadState();
    seedIfEmpty();
    // Ensure a valid active room after load.
    const p = activeProject();
    if (p && (!state.ui.activeRoomId || !p.rooms.some(function (r) { return r.id === state.ui.activeRoomId; }))) {
      state.ui.activeRoomId = p.rooms.length ? p.rooms[0].id : null;
    }
    installEventDelegation();
    installLifecycleSaves();
    installKeyboardHandling();
    render();
  }

  boot();
})();
</script>

<!-- Service worker registration (relative path; scope defaults to './') -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function (err) {
        console.warn('SW registration failed', err);
      });
    });
  }
</script>
