<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover so we can honor iOS safe-area insets on the fixed header/footer -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Spark Homes — Repair Estimator</title>

  <!-- PWA manifest + icons (all relative for GitHub Pages subpath deploys) -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />

  <!-- iOS / PWA meta -->
  <meta name="theme-color" content="#121214" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Estimator" />

  <style>
    /* ============================================================= */
    /* FONTS — GFS Neohellenic (vendored, offline)                    */
    /* ============================================================= */
    @font-face {
      font-family: 'GFS Neohellenic';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/gfs-neohellenic-latin-400-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'GFS Neohellenic';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('./fonts/gfs-neohellenic-latin-700-normal.woff2') format('woff2');
    }

    /* ============================================================= */
    /* DESIGN TOKENS                                                  */
    /* ============================================================= */
    :root {
      /* Palette — Spark: near-black primary, orange accent, warm cream bg */
      --navy: #121214;
      --accent: #d55101;
      --accent-600: #b34300;
      --accent-050: #fdeee3;
      --bg: #f8f2ec;
      --surface: #ffffff;
      --surface-2: #f3eae1;
      --ink: #1b2530;
      --ink-soft: #5c6773;
      --ink-faint: #9aa3ac;
      --line: #e8ddd1;
      --red: #c0392b;
      --red-050: #fbeae7;
      --amber: #c98a12;
      --amber-050: #fcf3e1;

      /* Type scale: 12 / 15 / 17 / 20 / 28 / 40 (GFS Neohellenic runs small) */
      --fs-12: 12px;
      --fs-14: 15px;
      --fs-16: 17px;
      --fs-20: 20px;
      --fs-28: 28px;
      --fs-40: 40px;
      --font: 'GFS Neohellenic', -apple-system, BlinkMacSystemFont, sans-serif;

      /* Spacing scale: 4 / 8 / 12 / 16 / 24 / 32 */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-6: 24px;
      --sp-8: 32px;

      --radius: 12px;
      --radius-sm: 10px;
      --radius-lg: 14px;
      --shadow: 0 2px 10px rgba(15, 42, 67, 0.08);

      /* safe-area insets (0 on non-notch devices) */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ============================================================= */
    /* BASE                                                          */
    /* ============================================================= */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      font-size: var(--fs-16);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.4;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: none;
    }
    /* GFS Neohellenic lacks tabular figures; nudge tracking for column alignment. */
    .tnum { font-variant-numeric: tabular-nums; letter-spacing: 0.01em; }
    button { font-family: inherit; cursor: pointer; }
    /* Minimum 44x44 tap targets everywhere */
    button, .tap { min-height: 44px; min-width: 44px; }

    /* ============================================================= */
    /* APP LAYOUT                                                     */
    /* ============================================================= */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* ---- Sticky header --------------------------------------------------- */
    .header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--navy);
      color: #fff;
      padding: calc(var(--safe-top) + var(--sp-3)) var(--sp-4) var(--sp-3);
      box-shadow: var(--shadow);
    }
    .header__row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--sp-3);
    }
    .header__brand {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--sp-2);
      min-width: 0;
      max-width: 62%;
    }
    .header__logo { height: 20px; display: block; }
    .project-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      color: #fff;
      padding: 4px 10px;
      text-align: left;
      min-height: 0;
      max-width: 100%;
    }
    .project-btn__name {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-btn__chev { opacity: 0.85; font-size: var(--fs-14); flex: none; }
    .header__total { text-align: right; }
    .header__total-label {
      font-size: var(--fs-12);
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .header__total-value {
      font-size: var(--fs-28);
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
    }

    /* progress bar */
    .progress {
      margin-top: var(--sp-3);
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }
    .progress__track {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress__fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 250ms ease;
    }
    .progress__label {
      font-size: var(--fs-12);
      color: rgba(255,255,255,0.75);
      white-space: nowrap;
      min-width: 96px;
      text-align: right;
    }

    /* ---- Room tabs ------------------------------------------------------- */
    .roomtabs {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: var(--sp-2);
      overflow-x: auto;
      padding: var(--sp-3) var(--sp-4);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .roomtabs::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--ink-soft);
      border-radius: 999px;
      padding: var(--sp-2) var(--sp-3);
      font-size: var(--fs-14);
      font-weight: 600;
      white-space: nowrap;
    }
    .chip--active {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }
    .chip__badge {
      font-size: var(--fs-12);
      font-weight: 700;
      background: var(--surface-2);
      color: var(--ink-soft);
      border-radius: 999px;
      padding: 1px var(--sp-2);
    }
    .chip--active .chip__badge { background: rgba(255,255,255,0.16); color: #fff; }
    .chip--add {
      background: transparent;
      border: 1px dashed var(--accent);
      color: var(--accent-600);
    }

    /* ---- List area ------------------------------------------------------- */
    .list {
      flex: 1;
      padding: var(--sp-4);
      padding-bottom: calc(96px + var(--safe-bottom));
    }
    .room-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      margin-bottom: var(--sp-4);
    }
    .room-head__title { font-size: var(--fs-20); font-weight: 700; }
    .room-head__sub { font-size: var(--fs-12); color: var(--ink-soft); margin-top: 2px; }
    .room-actions { display: flex; gap: var(--sp-2); }
    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      color: var(--ink-soft);
      font-size: var(--fs-14);
      font-weight: 600;
      padding: 0 var(--sp-3);
    }
    .icon-btn--danger { color: var(--red); border-color: var(--red-050); }

    /* Phase-1 placeholder card in the list area */
    .placeholder {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: var(--sp-6) var(--sp-4);
      text-align: center;
      color: var(--ink-soft);
      box-shadow: var(--shadow);
    }
    .placeholder__title { font-size: var(--fs-16); font-weight: 700; color: var(--ink); margin-bottom: var(--sp-2); }
    .placeholder__hint { font-size: var(--fs-14); }

    .empty {
      text-align: center;
      color: var(--ink-soft);
      padding: var(--sp-8) var(--sp-4);
    }
    .empty__title { font-size: var(--fs-20); font-weight: 700; color: var(--ink); margin-bottom: var(--sp-2); }

    /* ---- Groups (collapsible cards) ------------------------------------- */
    .group {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: var(--sp-3);
      overflow: hidden;
    }
    .group__head {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      width: 100%;
      background: transparent;
      border: none;
      padding: var(--sp-3) var(--sp-4);
      text-align: left;
      color: var(--ink);
    }
    .group__chev {
      color: var(--ink-faint);
      font-size: var(--fs-14);
      transition: transform 200ms ease;
      flex: 0 0 auto;
    }
    .group--open .group__chev { transform: rotate(90deg); }
    .group__title { flex: 1; font-size: var(--fs-16); font-weight: 700; }
    .group__check {
      flex: 0 0 auto;
      width: 20px; height: 20px;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: var(--fs-12); color: transparent;
    }
    .group__check--on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .group__total { flex: 0 0 auto; font-weight: 700; color: var(--ink); font-size: var(--fs-14); }

    /* animate expand/collapse via grid-template-rows (0fr -> 1fr) */
    .group__body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 200ms ease;
    }
    .group--open .group__body { grid-template-rows: 1fr; }
    .group__inner { overflow: hidden; }
    .group--open .group__inner { border-top: 1px solid var(--line); }

    .noaction {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px dashed var(--line);
      padding: var(--sp-3) var(--sp-4);
      text-align: left;
      color: var(--ink-soft);
      font-size: var(--fs-14);
      font-weight: 600;
    }
    .noaction--on { color: var(--accent-600); background: var(--accent-050); }
    .noaction__mark {
      width: 18px; height: 18px; border-radius: 4px;
      border: 1.5px solid var(--line);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: var(--fs-12);
    }
    .noaction--on .noaction__mark { background: var(--accent); border-color: var(--accent); color: #fff; }

    .group__foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
    }
    .grow-link {
      background: transparent;
      border: none;
      color: var(--ink-soft);
      font-size: var(--fs-14);
      font-weight: 700;
      padding: var(--sp-2) 0;
    }
    .grow-link--accent { color: var(--accent-600); }

    /* ---- Line items ----------------------------------------------------- */
    .item {
      display: flex;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--surface-2);
      cursor: pointer;
    }
    .item:last-child { border-bottom: none; }
    .item--checked { background: var(--accent-050); }
    .chk {
      flex: 0 0 auto;
      align-self: flex-start;
      background: transparent;
      border: none;
      padding: 0;
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    .chk__box {
      width: 24px; height: 24px;
      border-radius: 6px;
      border: 2px solid var(--line);
      display: inline-flex; align-items: center; justify-content: center;
      color: transparent;
      font-size: var(--fs-16);
      font-weight: 800;
    }
    .item--checked .chk__box { background: var(--accent); border-color: var(--accent); color: #fff; }
    .item__main { flex: 1; min-width: 0; }
    .item__top { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--sp-2); }
    .item__name {
      font-size: var(--fs-16);
      font-weight: 600;
      color: var(--ink);
    }
    .item:not(.item--checked) .item__name { color: var(--ink-soft); font-weight: 500; }
    .item__x {
      flex: 0 0 auto;
      background: transparent;
      border: none;
      color: var(--ink-faint);
      font-size: var(--fs-20);
      line-height: 1;
      padding: 0 var(--sp-2);
      min-width: 44px;
      min-height: 44px;
      margin: -10px -8px 0 0;
    }
    .item__ctl {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      margin-top: var(--sp-1);
      flex-wrap: wrap;
    }
    .unit {
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: var(--sp-1) var(--sp-2);
      margin-left: -8px;
      color: var(--ink-soft);
      font-size: var(--fs-14);
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
    }
    .unit__u { color: var(--ink-faint); font-size: var(--fs-12); }
    .item__add { color: var(--accent-600); font-size: var(--fs-14); font-weight: 600; }

    .qtyblock { display: flex; align-items: center; gap: var(--sp-2); }
    .qtyblock__eq { color: var(--ink-faint); }
    .qty {
      width: 76px;
      font-size: var(--fs-16); /* >=16px prevents iOS zoom-on-focus */
      text-align: right;
      padding: var(--sp-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink);
      -moz-appearance: textfield;
      appearance: textfield;
    }
    /* remove number spinners */
    .qty::-webkit-outer-spin-button,
    .qty::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .linetotal { font-weight: 700; color: var(--ink); min-width: 56px; text-align: right; }

    /* small tags/badges */
    .tag {
      display: inline-block;
      font-size: var(--fs-12);
      font-weight: 700;
      padding: 0 6px;
      border-radius: 999px;
      vertical-align: middle;
    }
    .tag--override { background: var(--amber-050); color: var(--amber); }
    .tag--custom { background: var(--surface-2); color: var(--ink-soft); }
    .tag--current { background: var(--accent); color: #fff; }
    .tag--suggested { background: var(--amber-050); color: var(--amber); }

    /* ---- Equipment year field + age flag -------------------------------- */
    .item__equip { margin-top: var(--sp-2); display: flex; align-items: center; gap: var(--sp-3); flex-wrap: wrap; }
    .yearfield { display: inline-flex; align-items: center; gap: var(--sp-2); }
    .yearfield__label { font-size: var(--fs-12); color: var(--ink-faint); font-weight: 600; }
    .year-input {
      width: 84px;
      font-size: var(--fs-16);
      text-align: center;
      padding: var(--sp-1) var(--sp-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink);
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .year-input::-webkit-outer-spin-button,
    .year-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .serialfield { display: inline-flex; align-items: center; gap: var(--sp-2); }
    .serialfield__label { font-size: var(--fs-12); color: var(--ink-faint); font-weight: 600; white-space: nowrap; }
    .serial-input {
      width: 132px;
      font-family: inherit;
      font-size: var(--fs-16);
      padding: var(--sp-1) var(--sp-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink);
    }
    .serial-input:focus { outline: none; border-color: var(--accent); }
    .agewarn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      flex-wrap: wrap;
      margin: var(--sp-2) 0 0 56px;
      padding: var(--sp-2) var(--sp-3);
      background: var(--amber-050);
      border: 1px solid #f0dcae;
      border-radius: var(--radius-sm);
    }
    .agewarn__text { font-size: var(--fs-12); font-weight: 700; color: var(--amber); }
    .agewarn__add {
      background: var(--amber);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: var(--fs-12);
      font-weight: 700;
      padding: var(--sp-2) var(--sp-3);
      min-height: 36px;
    }

    /* equipment photo pill */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-1);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink-soft);
      font-size: var(--fs-12);
      font-weight: 700;
      padding: var(--sp-1) var(--sp-3);
      min-height: 36px;
    }

    /* ---- Photo thumbnails ---------------------------------------------- */
    .thumbs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-2);
      margin-bottom: var(--sp-2);
      max-height: 52vh;
      overflow-y: auto;
    }
    .photo-cell { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .thumb {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--surface-2);
      border: 1px solid var(--line);
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb__del {
      position: absolute;
      top: 4px; right: 4px;
      width: 32px; height: 32px;
      min-width: 32px; min-height: 32px;
      border-radius: 999px;
      border: none;
      background: rgba(18, 18, 20, 0.78);
      color: #fff;
      font-size: var(--fs-20);
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-caption {
      width: 100%;
      font-family: inherit;
      font-size: var(--fs-12);
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 5px 7px;
      min-height: 0;
    }
    .photo-caption:focus { outline: none; border-color: var(--accent); }
    .ocr-btn {
      width: 100%;
      font-family: inherit;
      font-size: var(--fs-12);
      font-weight: 600;
      color: var(--accent-600);
      background: var(--accent-050);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 5px 7px;
      min-height: 0;
    }
    .ocr-btn[disabled] { opacity: 0.6; }
    .photos-empty {
      text-align: center;
      color: var(--ink-soft);
      padding: var(--sp-6) var(--sp-4);
      background: var(--surface-2);
      border-radius: var(--radius-sm);
    }

    /* ---- Settings ------------------------------------------------------ */
    .settings-block { margin-bottom: var(--sp-6); }
    .settings-block__label {
      font-size: var(--fs-12);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--ink-soft);
      font-weight: 700;
      margin-bottom: var(--sp-2);
    }
    .meter { height: 10px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
    .meter__fill { height: 100%; background: var(--accent); border-radius: 999px; }
    .meter__fill--warn { background: var(--red); }

    .price-list { max-height: 44vh; overflow-y: auto; border: 1px solid var(--line); border-radius: var(--radius-sm); }
    .price-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 1px solid var(--surface-2);
    }
    .price-row:last-child { border-bottom: none; }
    .price-row__main { flex: 1; min-width: 0; }
    .price-row__name { font-size: var(--fs-14); font-weight: 600; }
    .price-row__unit { font-size: var(--fs-12); color: var(--ink-faint); }
    .price-input {
      width: 96px;
      font-size: var(--fs-16);
      text-align: right;
      padding: var(--sp-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink);
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .price-input::-webkit-outer-spin-button,
    .price-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* ---- Toast --------------------------------------------------------- */
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(84px + var(--safe-bottom));
      transform: translate(-50%, 12px);
      max-width: 88%;
      background: var(--navy);
      color: #fff;
      font-size: var(--fs-14);
      font-weight: 600;
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--radius);
      box-shadow: 0 6px 20px rgba(15,42,67,0.3);
      opacity: 0;

      gap: var(--sp-4);

      background: var(--navy);
      color: #fff;
      border: none;

      padding: var(--sp-2) var(--sp-4);
      text-align: left;

    .dg-bar__k { font-size: var(--fs-12); color: rgba(255,255,255,0.6); }
    .dg-bar__v { font-size: var(--fs-16); font-weight: 800; }
    .dg-bar .dg-neg { color: #ff9e91; }
    .dg-bar__more { margin-left: auto; font-size: var(--fs-12); font-weight: 700; color: var(--accent); }
    .dg-bar--empty { justify-content: space-between; }
    .dg-bar__title { font-size: var(--fs-14); font-weight: 800; }
    .dg-bar__hint { font-size: var(--fs-12); color: rgba(255,255,255,0.6); }
    .dg-bar__k-long { display: none; }
    .dg-bar__k-short { display: inline; }
    @media (min-width: 400px) {
      .dg-bar__k-long { display: inline; }
      .dg-bar__k-short { display: none; }

    .dg-grid { display: flex; flex-direction: column; gap: var(--sp-2); margin: var(--sp-2) 0 var(--sp-4); }
    .dg-stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
    }
    .dg-stat--hero { background: var(--accent-050); border-color: var(--accent); }
    .dg-stat__k { font-size: var(--fs-14); color: var(--ink-soft); font-weight: 600; }
    .dg-stat--hero .dg-stat__k { color: var(--accent-600); }
    .dg-stat__v { font-size: var(--fs-20); font-weight: 800; color: var(--ink); }
    .dg-stat--hero .dg-stat__v { color: var(--accent-600); }
    .dg-neg { color: var(--red) !important; }
    .dg-range { font-size: var(--fs-14); color: var(--ink-soft); margin-bottom: var(--sp-3); }
    .dg-range .tnum { font-weight: 700; color: var(--ink); }
    .dg-warn {
      background: var(--amber-050);
      border: 1px solid #f0dcae;
      color: var(--amber);
      border-radius: var(--radius-sm);
      padding: var(--sp-3);
      font-size: var(--fs-14);
    }
    .dg-ok {
      background: var(--accent-050);
      border: 1px solid var(--accent);
      color: var(--accent-600);
      border-radius: var(--radius-sm);
      padding: var(--sp-3);
      font-size: var(--fs-14);
      font-weight: 600;
    }

    .bottombar {
      position: sticky;
      bottom: 0;
      z-index: 20;
    }
    /* Hide the sticky bottom bar (Deal Guard + footer) while the keyboard is up. */
    body.keyboard-open .bottombar { display: none; }

      background: var(--surface);
      border-top: 1px solid var(--line);
      display: flex;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4) calc(var(--sp-3) + var(--safe-bottom));

      border: 1px solid var(--line);

      color: var(--ink);
      border-radius: var(--radius-sm);

      font-weight: 700;

      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* MODAL / SHEET                                                  */
    /* ============================================================= */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(15, 42, 67, 0.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay--open { display: flex; }
    .sheet {
      width: 100%;
      max-width: 560px;
      max-height: 85dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: var(--sp-4) var(--sp-4) calc(var(--sp-4) + var(--safe-bottom));
      box-shadow: 0 -4px 24px rgba(15,42,67,0.18);
      animation: sheet-up 160ms ease;
    }
    /* Drag-handle cue: the universal "this is a dismissible sheet" signal. */
    .sheet::before {
      content: '';
      flex: none;
      width: 36px;
      height: 4px;
      border-radius: 999px;
      background: #d9cebf;
      margin: 0 auto var(--sp-3);
    }
    /* Body content scrolls; the header (title + close) stays pinned above it. */
    .sheet__scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    @keyframes sheet-up { from { transform: translateY(16px); opacity: 0.6; } to { transform: translateY(0); opacity: 1; } }
    .sheet__head {
      flex: none;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--sp-3);
      margin-bottom: var(--sp-4);
    }
    .sheet__title { font-size: var(--fs-20); font-weight: 700; margin: 0; flex: 1; min-width: 0; }
    .sheet__close {
      flex: none;
      width: 44px; height: 44px;
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      margin: -4px -6px 0 0;
      background: transparent;
      border: none;
      border-radius: 999px;
      color: var(--ink-soft);
      font-size: var(--fs-20);
      line-height: 1;
    }
    .sheet__label { display: block; font-size: var(--fs-12); color: var(--ink-soft); margin-bottom: var(--sp-1); text-transform: uppercase; letter-spacing: 0.03em; }
    .field {
      width: 100%;
      font-size: var(--fs-16); /* >=16px prevents iOS zoom-on-focus */
      padding: var(--sp-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink);
      margin-bottom: var(--sp-4);
    }
    .sheet__actions { display: flex; gap: var(--sp-2); }
    .btn {
      flex: 1;
      border-radius: var(--radius-sm);
      font-size: var(--fs-16);
      font-weight: 700;
      padding: var(--sp-3);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
    }
    .btn--primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn--danger { background: var(--red); border-color: var(--red); color: #fff; }
    .btn--ghost { background: transparent; }

    /* project list rows inside the projects sheet */
    .proj-list { display: flex; flex-direction: column; gap: var(--sp-2); margin-bottom: var(--sp-4); max-height: 46vh; overflow-y: auto; }
    .proj-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: var(--sp-3);
      background: var(--surface);
    }
    .proj-row--active { border-color: var(--accent); background: var(--accent-050); }
    .proj-row__main { flex: 1; text-align: left; background: transparent; border: none; padding: 0; }
    .proj-row__name { font-size: var(--fs-16); font-weight: 700; color: var(--ink); }
    .proj-row__meta { font-size: var(--fs-12); color: var(--ink-soft); margin-top: 2px; }
    .proj-row__total { font-size: var(--fs-14); font-weight: 700; color: var(--accent-600); }
    .mini-btn {
      background: transparent;
      border: none;
      color: var(--ink-soft);
      font-size: var(--fs-14);
      font-weight: 700;
      padding: var(--sp-2);
    }
    .mini-btn--danger { color: var(--red); }

    /* room-type picker grid */
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-2); margin-bottom: var(--sp-4); }
    .type-btn {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: var(--sp-3);
      font-size: var(--fs-14);
      font-weight: 700;
      color: var(--ink);
      text-align: left;
    }

    .divider { height: 1px; background: var(--line); margin: var(--sp-4) 0; border: none; }
    .hint { font-size: var(--fs-12); color: var(--ink-faint); }
    .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
  </style>
</head>

      { id: 'ba-tile',   name: 'Tile',                items: ['ba-05', 'ba-06'] },
    ],
    bedroom: [
      { id: 'bd-flooring', name: 'Flooring', items: range('ig', 1, 6) },
      { id: 'bd-paint',    name: 'Paint',    items: range('ig', 7, 9) },
      { id: 'bd-doors',    name: 'Doors',    items: ['ig-10', 'ig-11', 'ig-13'] },
      { id: 'bd-closet',   name: 'Closet',   items: ['ig-12'] },
    ],
    living: [
      { id: 'lv-flooring', name: 'Flooring', items: range('ig', 1, 6) },
      { id: 'lv-paint',    name: 'Paint',    items: range('ig', 7, 9) },
      { id: 'lv-doors',    name: 'Doors',    items: range('ig', 10, 13) },
      { id: 'lv-lighting', name: 'Lighting', items: ['ig-22'] },
    ],
    systems: [
      { id: 'as-hvac',       name: 'HVAC',                 items: range('as', 1, 9) },
      { id: 'as-electrical', name: 'Electrical',           items: ['as-10', 'as-11', 'as-18', 'as-19', 'as-20', 'as-24'] },
      { id: 'as-structural', name: 'Structural',           items: range('as', 12, 17) },
      { id: 'as-insulation', name: 'Insulation & Drywall', items: ['as-21', 'as-22', 'as-23'] },
    ],
    exterior: [
      { id: 'ex-fence',   name: 'Fence',           items: range('ex', 1, 3) },
      { id: 'ex-siding',  name: 'Siding',          items: range('ex', 5, 9) },
      { id: 'ex-windows', name: 'Windows',         items: range('ex', 13, 17) },
      { id: 'ex-garage',  name: 'Garage',          items: range('ex', 21, 23) },
      { id: 'ex-trees',   name: 'Trees & Yard',    items: ['ex-04', 'ex-10', 'ex-11', 'ex-12', 'ex-20'] },
      { id: 'ex-general', name: 'Exterior General', items: ['ex-18', 'ex-19'] },
    ],
  };

  function groupsForRoom(room) { return ROOM_GROUPS[room.type] || []; }

  /* Equipment items carry a year field (age flags) and support their own
     photos: Furnace, Condensing Unit, Water Heater, Roof. */
  const EQUIPMENT_ITEMS = ['as-01', 'as-02', 'as-08', 'as-16'];
  function isEquipment(itemId) { return EQUIPMENT_ITEMS.indexOf(itemId) >= 0; }

  /* Items that carry a serial number (systems + kitchen appliances; roof has none).
     These get a Serial # field, their own photos, and a "Scan serial #" OCR button. */
  const SERIAL_ITEMS = ['as-01', 'as-02', 'as-08', 'kt-11', 'kt-12', 'kt-13', 'kt-14', 'kt-15', 'kt-16', 'kt-17'];
  function isSerialItem(itemId) { return SERIAL_ITEMS.indexOf(itemId) >= 0; }
  // Parse the itemId out of a photo key ('roomId:itemId'); '' for the 'project' key.
  function photoKeyItemId(key) {
    if (!key || key === 'project') return '';
    const i = key.indexOf(':');
    return i >= 0 ? key.slice(i + 1) : '';
  }

  // Expected service lifespans (years) for the age-flag heuristic.
  const LIFESPANS = { 'as-01': 18, 'as-02': 15, 'as-08': 11, 'as-16': 22 };
  const EQUIP_LABELS = { 'as-01': 'Furnace', 'as-02': 'Condensing unit', 'as-08': 'Water heater', 'as-16': 'Roof' };
  const CURRENT_YEAR = new Date().getFullYear();

  // Catalog flooring items (per-sqft) used by the quantity pre-fill.
  const FLOORING_IDS = ['ig-01', 'ig-02', 'ig-03', 'ig-04', 'ig-05', 'ig-06'];

  /* ============================================================= */
  /* STATE                                                         */
  /* ============================================================= */
  const SK_DATA = 'spark:data';            // { projects: {id: project}, activeProjectId }
  const SK_PRICES = 'spark:globalPrices';  // { itemId: number }  (live across all projects)

  const state = {
    projects: {},          // id -> project (see data model in 00-architecture.mdc)
    activeProjectId: null,
    globalPriceOverrides: {},
    // transient UI state; not persisted. expandedGroups keyed 'roomId:groupId' -> bool.
    ui: { activeRoomId: null, expandedGroups: {} },
  };

  /* ============================================================= */
  /* UTILITIES                                                     */
  /* ============================================================= */
  function genId(prefix) {
    return (prefix || 'id') + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
  }

  // Keep only [0-9.] (one decimal point) in a numeric text input, rewriting the
  // field in place so iOS never surfaces its password/contact autofill bar.
  function sanitizeDecimal(input) {
    let v = input.value.replace(/[^0-9.]/g, '');
    const dot = v.indexOf('.');
    if (dot >= 0) v = v.slice(0, dot + 1) + v.slice(dot + 1).replace(/\./g, '');
    if (v !== input.value) input.value = v;
    return v.trim();
  }
  // Keep only digits (year fields).
  function sanitizeDigits(input) {
    const v = input.value.replace(/[^0-9]/g, '');
    if (v !== input.value) input.value = v;
    return v.trim();
  }

  // Escape user-supplied strings before injecting into HTML templates.
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // UI money: whole dollars with thousands separators, no cents (totals).
  function money(n) {
    const v = Math.round(Number(n) || 0);
    return '$' + v.toLocaleString('en-US');
  }

  // Unit cost money: cents allowed (design system permits cents on unit costs).
  function unitMoney(n) {
    const v = Number(n) || 0;
    // Show cents only when the value actually has a fractional part.
    const hasCents = Math.round(v * 100) % 100 !== 0;
    return '$' + v.toLocaleString('en-US', {
      minimumFractionDigits: hasCents ? 2 : 0,
      maximumFractionDigits: 2,
    });
  }

  /* ============================================================= */
  /* MATH — small pure functions (no calculation inside templates)  */
  /* ============================================================= */

  // Effective unit cost precedence: per-item override -> global override -> catalog default.
  function effectiveCost(project, roomId, itemId) {
    const sel = project.selections[roomId + ':' + itemId];
    if (sel && sel.unitCostOverride != null) return sel.unitCostOverride;
    if (state.globalPriceOverrides[itemId] != null) return state.globalPriceOverrides[itemId];
    const custom = findCustomItem(project, roomId, itemId);
    if (custom) return custom.cost;
    const base = ITEM_BY_ID[itemId];
    return base ? base.cost : 0;
  }

  function findCustomItem(project, roomId, itemId) {
    return project.customItems.find(function (c) { return c.id === itemId && c.roomId === roomId; }) || null;
  }

  function selKey(roomId, itemId) { return roomId + ':' + itemId; }
  function getSel(project, roomId, itemId) { return project.selections[selKey(roomId, itemId)]; }
  function ensureSel(project, roomId, itemId) {
    const k = selKey(roomId, itemId);
    if (!project.selections[k]) project.selections[k] = { checked: false, qty: null, unitCostOverride: null, year: null };
    return project.selections[k];
  }
  function isRemoved(project, roomId, itemId) { return project.removedItemIds.indexOf(selKey(roomId, itemId)) >= 0; }
  function customItemsInGroup(project, roomId, groupId) {
    return project.customItems.filter(function (c) { return c.roomId === roomId && c.groupId === groupId; });
  }
  // "No action needed" is stored as a reserved sentinel selection so it stays
  // inside the unified selections map (no extra top-level bookkeeping).
  function naItemId(groupId) { return 'na:' + groupId; }

  // Resolve display metadata for either a catalog or custom item.
  function itemMeta(project, roomId, itemId) {
    const custom = findCustomItem(project, roomId, itemId);
    if (custom) return { name: custom.name, unit: custom.unit, isCustom: true };
    const base = ITEM_BY_ID[itemId];
    return { name: base ? base.name : itemId, unit: base ? base.unit : '', isCustom: false };
  }

  // Ordered visible item ids for a group (catalog first, then customs), minus hidden.
  function groupItemIds(project, roomId, group) {
    const catalog = group.items.filter(function (id) { return !isRemoved(project, roomId, id); });
    const customs = customItemsInGroup(project, roomId, group.id).map(function (c) { return c.id; });
    return catalog.concat(customs);
  }

  // Line total = qty × effectiveCost. No minimum-price logic.
  function lineTotal(project, roomId, itemId) {
    const sel = project.selections[roomId + ':' + itemId];
    if (!sel || !sel.checked) return 0;
    const qty = Number(sel.qty) || 0;
    return qty * effectiveCost(project, roomId, itemId);
  }

  // Sum of all checked line items in a room instance.
  function roomTotal(project, room) {
    let sum = 0;
    for (const key in project.selections) {
      if (key.indexOf(room.id + ':') === 0) {
        const itemId = key.slice(room.id.length + 1);
        sum += lineTotal(project, room.id, itemId);
      }
    }
    return sum;
  }

  // Grand total across the whole project.
  function projectTotal(project) {
    return project.rooms.reduce(function (sum, r) { return sum + roomTotal(project, r); }, 0);
  }

  // Sum of one group's checked line items (catalog + custom).
  function groupTotal(project, room, group) {
    return groupItemIds(project, room.id, group).reduce(function (sum, id) {
      return sum + lineTotal(project, room.id, id);
    }, 0);
  }

  // A group is reviewed when "No action needed" is on OR any item in it is checked.
  function isGroupReviewed(project, room, group) {
    const na = getSel(project, room.id, naItemId(group.id));
    if (na && na.checked) return true;
    return groupItemIds(project, room.id, group).some(function (id) {
      const s = getSel(project, room.id, id);
      return s && s.checked;
    });
  }

  /* Progress = reviewed groups / total groups across ALL rooms & instances.
     Adding a room grows the denominator (intended). Custom items live inside
     existing groups, so they never change the denominator. */
  function progress(project) {
    let total = 0, reviewed = 0;
    project.rooms.forEach(function (room) {
      groupsForRoom(room).forEach(function (group) {
        total++;
        if (isGroupReviewed(project, room, group)) reviewed++;
      });
    });
    return { reviewed: reviewed, total: total, pct: total ? Math.round((reviewed / total) * 100) : 0 };
  }

  /* Quantity pre-fill — suggested starting qty from project square footage.
     Suggestions are hints only: shown badged, fully editable, never auto-checked. */
  function suggestedQty(project, room, itemId) {
    const sqft = Number(project.meta.sqft) || 0;
    if (!sqft) return null;
    const wholeHouse = room.type === 'interior';
    if (FLOORING_IDS.indexOf(itemId) >= 0) {
      if (!wholeHouse) return null;
      return Math.round(sqft);                                                 // flooring ≈ sqft
    }
    if (itemId === 'ig-07') {
      if (!wholeHouse) return null;
      return Math.round(2.75 * sqft);                                            // interior paint ≈ 2.75 × sqft
    }
    if (itemId === 'ig-19') return Math.round(1.5 * 4 * Math.sqrt(sqft));      // trim LF ≈ 1.5 × perimeter of square footprint
    if (itemId === 'as-16') return Math.max(1, Math.round(sqft / 225));        // roof (unit is per 225 sqft)
    if (itemId === 'as-22') return Math.max(1, Math.round(sqft / 1600));       // attic insulation (per ~1,600 sqft)
    return null;
  }

  // Equipment age heuristic. Flags when age ≥ lifespan − 2.
  function ageFlag(project, roomId, itemId) {
    const sel = getSel(project, roomId, itemId);
    const year = sel && sel.year != null ? Number(sel.year) : null;
    const lifespan = LIFESPANS[itemId];
    if (!year || !lifespan) return null;
    const age = CURRENT_YEAR - year;
    if (age < 0) return null;
    return age >= lifespan - 2 ? { age: age, lifespan: lifespan } : null;
  }

  // Is a group (by id) marked "No action needed" in any room instance?
  function groupNa(project, groupId) {
    return project.rooms.some(function (room) {
      const s = getSel(project, room.id, naItemId(groupId));
      return !!(s && s.checked);
    });
  }

  // Is a group (by id) reviewed in any room instance?
  function groupReviewedAnywhere(project, groupId) {
    return project.rooms.some(function (room) {
      return groupsForRoom(room).some(function (g) {
        return g.id === groupId && isGroupReviewed(project, room, g);
      });
    });
  }

  // Big-ticket systems that should be reviewed before exporting an offer.
  function unreviewedCritical(project) {
    const out = [];
    [['as-hvac', 'HVAC'], ['as-electrical', 'Electrical'], ['as-structural', 'Structural']].forEach(function (pair) {
      if (!groupReviewedAnywhere(project, pair[0])) out.push(pair[1]);
    });
    // Roof (as-16) is its own line inside Structural — check it explicitly.
    // Treat it as reviewed if it's checked, its install year is filled in
    // (evidence the roof was assessed), or Structural is marked no-action.
    const roofChecked = project.rooms.some(function (room) {
      const s = getSel(project, room.id, 'as-16');
      return !!(s && s.checked);
    });
    const roofYearFilled = project.rooms.some(function (room) {
      const s = getSel(project, room.id, 'as-16');
      return !!(s && s.year != null);
    });
    if (!roofChecked && !roofYearFilled && !groupNa(project, 'as-structural')) out.push('Roof');
    return out;
  }

  /* Deal Guard — the 70% rule and margin, with a confidence range that
     tightens as more groups are reviewed. All pure math. */
  function dealGuard(project) {
    const arv = Number(project.meta.arv) || 0;
    const repairs = projectTotal(project);
    const maxOffer = arv ? (arv * 0.70 - repairs) : 0;
    // Under the 70% rule, margin = 0.30 × ARV by construction — repairs move the max
    // offer, not the margin. Labels must say the margin is conditional on offering AT
    // the max offer, so a tester who adds repairs and sees margin unchanged doesn't
    // read it as a bug.
    const margin = arv ? (arv - maxOffer - repairs) : 0;
    const prog = progress(project);
    const unrevFrac = prog.total ? (prog.total - prog.reviewed) / prog.total : 0;
    const rangePct = 0.05 + 0.15 * unrevFrac; // ±5% baseline, widening with unreviewed groups
    return {
      arv: arv, repairs: repairs, maxOffer: maxOffer, margin: margin,
      rangePct: rangePct, low: repairs * (1 - rangePct), high: repairs * (1 + rangePct),
    };
  }

  /* ============================================================= */
  /* STORAGE — localStorage load/save (debounced) + lifecycle saves */
  /* ============================================================= */
  let saveTimer = null;

  function loadState() {
    try {
      const raw = localStorage.getItem(SK_DATA);
      if (raw) {
        const parsed = JSON.parse(raw);
        state.projects = parsed.projects || {};
        state.activeProjectId = parsed.activeProjectId || null;
      }
      const rawP = localStorage.getItem(SK_PRICES);
      if (rawP) state.globalPriceOverrides = JSON.parse(rawP) || {};
    } catch (e) {
      console.warn('Failed to load state', e);
    }
  }

  // Write immediately (used on lifecycle events). Returns true on success.
  function saveNow() {
    try {
      localStorage.setItem(SK_DATA, JSON.stringify({
        projects: state.projects,
        activeProjectId: state.activeProjectId,
      }));
      localStorage.setItem(SK_PRICES, JSON.stringify(state.globalPriceOverrides));
      return true;
    } catch (e) {
      // QuotaExceededError handling gets a visible UI in Phase 3 (photos).
      console.error('Save failed', e);
      return false;
    }
  }

  // Debounced autosave for high-frequency changes (typing, toggles).
  function scheduleSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNow, 400);
  }

  // beforeunload is unreliable on mobile — save on visibilitychange/pagehide.
  function installLifecycleSaves() {
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'hidden') saveNow();
    });
    window.addEventListener('pagehide', saveNow);
  }

  /* ============================================================= */
  /* PROJECT + ROOM MODEL (CRUD)                                    */
  /* ============================================================= */

  function newProject(name, meta) {
    const now = Date.now();
    return {
      id: genId('p'),
      name: name || 'New Estimate',
      createdAt: now,
      updatedAt: now,
      meta: Object.assign({ sqft: null, beds: null, baths: null, arv: null }, meta || {}),
      rooms: [],
      selections: {},
      customItems: [],
      removedItemIds: [],
      photos: {},
      notes: '', // free-text walkthrough notes, per project (isolated like everything else)
    };
  }

  function touch(project) { project.updatedAt = Date.now(); }

  function activeProject() {
    return state.projects[state.activeProjectId] || null;
  }

  function makeRoomLabel(project, type) {
    const t = ROOM_TYPES[type];
    const count = project.rooms.filter(function (r) { return r.type === type; }).length;
    // First single-instance room keeps the bare name; everything else is numbered.
    if (count === 0 && !t.multi) return t.name;
    return t.name + ' ' + (count + 1);
  }

  function addRoom(project, type) {
    const room = { id: genId('r'), type: type, label: makeRoomLabel(project, type) };
    project.rooms.push(room);
    touch(project);
    return room;
  }

  function removeRoom(project, roomId) {
    project.rooms = project.rooms.filter(function (r) { return r.id !== roomId; });
    // Purge every key belonging to this room — no other bookkeeping needed.
    for (const key in project.selections) {
      if (key.indexOf(roomId + ':') === 0) delete project.selections[key];
    }
    project.customItems = project.customItems.filter(function (c) { return c.roomId !== roomId; });
    project.removedItemIds = project.removedItemIds.filter(function (k) { return k.indexOf(roomId + ':') !== 0; });
    for (const pkey in project.photos) {
      if (pkey.indexOf(roomId + ':') === 0) delete project.photos[pkey];
    }
    touch(project);
  }

  // Room instances for a new project, using beds/baths counts when provided.
  function buildDefaultRoomList(meta) {
    const beds = Math.max(0, parseInt(meta.beds, 10) || 0);
    const baths = Math.max(0, parseInt(meta.baths, 10) || 0);
    const list = ['interior', 'kitchen'];
    for (let i = 0; i < (baths || 1); i++) list.push('bathroom');
    for (let i = 0; i < (beds || 1); i++) list.push('bedroom');
    list.push('living', 'systems', 'exterior');
    return list;
  }

  function createProject(name, meta) {
    const p = newProject(name, meta);
    buildDefaultRoomList(p.meta).forEach(function (t) { addRoom(p, t); });
    state.projects[p.id] = p;
    setActiveProject(p.id);
    return p;
  }

  function deleteProject(id) {
    delete state.projects[id];
    if (state.activeProjectId === id) {
      const remaining = Object.keys(state.projects);
      state.activeProjectId = remaining.length ? remaining[0] : null;
      state.ui.activeRoomId = null;
    }
    if (!state.activeProjectId) {
      // Never leave the app project-less — seed a fresh empty estimate.
      createProject('New Estimate', {});
    }
    saveNow();
  }

  function setActiveProject(id) {
    state.activeProjectId = id;
    const p = activeProject();
    state.ui.activeRoomId = p && p.rooms.length ? p.rooms[0].id : null;
    saveNow();
  }

  /* ============================================================= */
  /* DEMO SEED — empty demo project (full content arrives in Phase 7) */
  /* ============================================================= */
  function seedIfEmpty() {
    if (Object.keys(state.projects).length > 0) return;
    seedDemo();
  }

  /* A fully-populated demo so a reviewer's first screen shows every feature:
     realistic meta, ~13 checked selections across 5 room instances, an
     age-flagged furnace, a per-project price override, a custom line item,
     and a "No action needed" group. Photos are intentionally left for the
     reviewer to add (we never fabricate image data). */
  function seedDemo() {
    const meta = { sqft: 1400, beds: 3, baths: 2, arv: 220000 };
    const p = newProject('742 Maple St — Demo', meta);
    p.notes = 'Estate sale, vacant. Furnace looks original — verify heat exchanger. Confirm foundation crack in NE corner before finalizing offer.';
    buildDefaultRoomList(meta).forEach(function (t) { addRoom(p, t); });

    const interior = p.rooms.find(function (r) { return r.type === 'interior'; });
    const kitchen = p.rooms.find(function (r) { return r.type === 'kitchen'; });
    const bath1 = p.rooms.filter(function (r) { return r.type === 'bathroom'; })[0];
    const systems = p.rooms.find(function (r) { return r.type === 'systems'; });
    const exterior = p.rooms.find(function (r) { return r.type === 'exterior'; });

    function set(room, itemId, opts) {
      p.selections[selKey(room.id, itemId)] =
        Object.assign({ checked: false, qty: null, unitCostOverride: null, year: null }, opts);
    }
    // Check an item using its sqft suggestion (keeps the "suggested" badge).
    function checkSuggested(room, itemId) {
      const q = suggestedQty(p, room, itemId);
      set(room, itemId, { checked: true, qty: q != null ? q : 1, qtySuggested: q != null });
    }

    // Interior / General — suggestions + a flat item, Pest Control = no action.
    checkSuggested(interior, 'ig-01');                       // Refinish hardwood ≈ 1,400 sqft
    checkSuggested(interior, 'ig-07');                       // Interior paint ≈ 3,850
    set(interior, 'ig-20', { checked: true, qty: 1 });      // MISC / Punch list
    p.selections[selKey(interior.id, naItemId('ig-pest'))] =
      { checked: true, qty: null, unitCostOverride: null, year: null }; // No action needed

    // Kitchen — includes a per-project price override on granite.
    set(kitchen, 'kt-05', { checked: true, qty: 1 });                      // Cabinets (labor & paint)
    set(kitchen, 'kt-13', { checked: true, qty: 1 });                      // Range
    set(kitchen, 'kt-06', { checked: true, qty: 22, unitCostOverride: 45 }); // Granite (override)

    // Bathroom 1
    set(bath1, 'ba-04', { checked: true, qty: 1 });   // Toilet
    set(bath1, 'ba-08', { checked: true, qty: 1 });   // Reglaze tub + surround

    // Systems — Electrical + Water Heater checked; Furnace year triggers an age flag.
    set(systems, 'as-11', { checked: true, qty: 1 });               // Standard electrical
    set(systems, 'as-08', { checked: true, qty: 1, year: 2019 });   // Water heater (still in life)
    set(systems, 'as-01', { checked: false, year: 2005 });          // Furnace — old, flag + one-tap add

    // Exterior — paint, garage door, and a custom line item.
    set(exterior, 'ex-07', { checked: true, qty: 1200 });  // Exterior paint
    set(exterior, 'ex-22', { checked: true, qty: 1 });     // Garage door (2 car)
    const cid = genId('c');
    p.customItems.push({ id: cid, roomId: exterior.id, groupId: 'ex-general', name: 'Dumpster rental', cost: 450, unit: 'flat' });
    p.selections[selKey(exterior.id, cid)] = { checked: true, qty: 1, unitCostOverride: null, year: null, qtySuggested: false };

    state.projects[p.id] = p;
    state.activeProjectId = p.id;
    state.ui.activeRoomId = interior.id;
    saveNow();
  }

  /* ============================================================= */
  /* RENDER — template-literal functions + targeted DOM writes      */
  /* ============================================================= */
  const el = {
    header: document.getElementById('header'),
    roomtabs: document.getElementById('roomtabs'),
    list: document.getElementById('list'),
    dealguard: document.getElementById('dealguard'),
    footer: document.getElementById('footer'),
    overlay: document.getElementById('overlay'),
    sheet: document.getElementById('sheet'),
  };

  let lastHero = 0;     // last displayed hero value (for count-up animation)
  let heroRaf = null;

  // Count-up animation for the hero total (~250ms), per design system.
  function animateHeroTo(to) {
    const node = document.getElementById('hero-total');
    if (!node) { lastHero = to; return; }
    const from = lastHero;
    if (from === to) { node.textContent = money(to); return; }
    if (heroRaf) cancelAnimationFrame(heroRaf);
    const start = performance.now();
    const dur = 250;
    function step(now) {
      const t = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
      const cur = from + (to - from) * eased;
      const live = document.getElementById('hero-total');
      if (live) live.textContent = money(cur);
      if (t < 1) { heroRaf = requestAnimationFrame(step); }
      else { lastHero = to; heroRaf = null; }
    }
    heroRaf = requestAnimationFrame(step);
  }

  // Set the hero total instantly (used on the qty hot path — no jitter while typing).
  function setHeroNow(value) {
    const node = document.getElementById('hero-total');
    if (node) node.textContent = money(value);
    lastHero = value;
  }

  function renderList() {

      el.list.innerHTML = '<div class="empty"><div class="empty__title">No project open</div><div>Create a project to start a walkthrough.</div></div>';

  // Default collapse: first group of a room is open, the rest collapsed.
  function isGroupExpanded(roomId, groupId, index) {
    const key = selKey(roomId, groupId);
    const v = state.ui.expandedGroups[key];
    return v == null ? index === 0 : v;
  }

  function renderGroup(project, room, group, index) {
    const reviewed = isGroupReviewed(project, room, group);
    const open = isGroupExpanded(room.id, group.id, index);
    const gt = groupTotal(project, room, group);
    const naOn = (function () { const s = getSel(project, room.id, naItemId(group.id)); return !!(s && s.checked); })();

    const itemIds = groupItemIds(project, room.id, group);
    const rowsHtml = itemIds.map(function (id) { return renderItem(project, room, group, id); }).join('');

    const hiddenCount = group.items.filter(function (id) { return isRemoved(project, room.id, id); }).length;
    const hiddenHtml = hiddenCount
      ? '<button class="grow-link tap" data-action="restore-hidden" data-room="' + room.id + '" data-group="' + group.id + '">' +
          hiddenCount + ' hidden — restore</button>'
      : '';

    return [
      '<section class="group ', open ? 'group--open' : '', '">',
        '<button class="group__head tap" data-action="toggle-group" data-room="', room.id, '" data-group="', group.id, '">',
          '<span class="group__chev" aria-hidden="true">▸</span>',
          '<span class="group__title">', esc(room.label), ': ', esc(group.name), '</span>',
          '<span class="group__check ', reviewed ? 'group__check--on' : '', '" aria-hidden="true">', (reviewed ? '✓' : ''), '</span>',
          '<span class="group__total tnum" data-grouptotal="', room.id, ':', group.id, '">', money(gt), '</span>',
        '</button>',
        '<div class="group__body"><div class="group__inner">',
          '<button class="noaction ', naOn ? 'noaction--on' : '', ' tap" data-action="toggle-noaction" data-room="', room.id, '" data-group="', group.id, '">',
            '<span class="noaction__mark">', (naOn ? '✓' : ''), '</span> No action needed',
          '</button>',
          rowsHtml,
          '<div class="group__foot">',
            '<button class="grow-link grow-link--accent tap" data-action="add-custom" data-room="', room.id, '" data-group="', group.id, '">+ Add custom item</button>',
            hiddenHtml,
          '</div>',
        '</div></div>',
      '</section>',
    ].join('');
  }

  function renderItem(project, room, group, itemId) {
    const sel = getSel(project, room.id, itemId);
    const checked = !!(sel && sel.checked);
    const meta = itemMeta(project, room.id, itemId);
    const cost = effectiveCost(project, room.id, itemId);
    const overridden = !!(sel && sel.unitCostOverride != null);
    const key = selKey(room.id, itemId);
    const qtyVal = sel && sel.qty != null ? sel.qty : '';
    const sug = suggestedQty(project, room, itemId);
    const showSuggestedBadge = checked && sel && sel.qtySuggested && sug != null;

    const rightHtml = checked
      ? [
          '<div class="qtyblock">',
            (showSuggestedBadge ? '<span class="tag tag--suggested">suggested</span>' : ''),
            '<input class="qty tnum" type="text" inputmode="decimal" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" ',
              'value="', esc(qtyVal), '" data-room="', room.id, '" data-item="', itemId, '" aria-label="Quantity" />',
            '<span class="qtyblock__eq">=</span>',
            '<span class="linetotal tnum" data-linetotal="', key, '">', money(lineTotal(project, room.id, itemId)), '</span>',
          '</div>',
        ].join('')
      : (sug != null
          ? '<span class="item__add">Tap row to add · suggests <b>' + sug.toLocaleString('en-US') + '</b> ' + esc(meta.unit || '') + '</span>'
          : '<span class="item__add">Tap row to add</span>');

    return [
      '<div class="item ', checked ? 'item--checked' : '', '" data-action="toggle-item" data-room="', room.id, '" data-item="', itemId, '" data-group="', group.id, '">',
        '<span class="chk" role="checkbox" aria-checked="', checked, '" aria-label="', esc(meta.name), '">',
          '<span class="chk__box">', (checked ? '✓' : ''), '</span>',
        '</span>',
        '<div class="item__main">',
          '<div class="item__top">',
            '<span class="item__name">', esc(meta.name), meta.isCustom ? ' <span class="tag tag--custom">custom</span>' : '', '</span>',
            (meta.isCustom
              ? '<button class="item__x tap" data-action="delete-custom" data-room="' + room.id + '" data-item="' + itemId + '" aria-label="Delete custom item">×</button>'
              : '<button class="item__x tap" data-action="hide-item" data-room="' + room.id + '" data-item="' + itemId + '" aria-label="Hide item">×</button>'),
          '</div>',
          '<div class="item__ctl">',
            '<button class="unit tap" data-action="edit-cost" data-room="', room.id, '" data-item="', itemId, '">',
              '<span class="tnum">', unitMoney(cost), '</span><span class="unit__u">/', esc(meta.unit || ''), '</span>',
              overridden ? ' <span class="tag tag--override">override</span>' : '',
            '</button>',
            rightHtml,
          '</div>',
          isEquipment(itemId)
            ? renderEquipRow(project, room, itemId)
            : (isSerialItem(itemId) ? renderApplianceRow(project, room, itemId) : ''),
        '</div>',
      '</div>',
    ].join('');
  }

  function renderFooter() {
    const p = activeProject();
    const n = p ? photoCount(p, 'project') : 0;
    el.footer.innerHTML = [
      '<button class="footer__btn tap" data-action="open-photos">Photos', (n ? ' (' + n + ')' : ''), '</button>',
      '<button class="footer__btn tap" data-action="open-settings">Settings</button>',

  // Full render — used on structural changes (nav, add/remove, project switch).
  // opts.preserveScroll keeps the window scroll position (e.g. toggling an item
  // deep in the list shouldn't jump the page to the top).
  function render(opts) {
    const y = window.scrollY;
    renderHeader();
    renderRoomTabs();
    renderList();
    renderDealGuard();
    renderFooter();
    if (opts && opts.preserveScroll) window.scrollTo(0, y);
  }

  // ---- Targeted DOM writes (HOT PATH) — never re-render while typing qty ----
  function setNodeText(selector, text) {
    const node = document.querySelector(selector);
    if (node) node.textContent = text;
  }

  // After a qty change: update the line total, every group total in this room
  // that contains the item, the room chip badge, and the hero total — all via
  // targeted writes so the focused input never blurs.
  function refreshTotalsAfterQty(project, room, itemId) {
    const lt = money(lineTotal(project, room.id, itemId));
    // An item can render in two groups (e.g. a door in Doors + Closet) — update all.
    document.querySelectorAll('[data-linetotal="' + selKey(room.id, itemId) + '"]').forEach(function (n) { n.textContent = lt; });
    groupsForRoom(room).forEach(function (g) {
      setNodeText('[data-grouptotal="' + room.id + ':' + g.id + '"]', money(groupTotal(project, room, g)));
    });
    // A room may appear both in the chip bar and the room-head sub — update both.
    document.querySelectorAll('[data-roombadge="' + room.id + '"]').forEach(function (node) {
      node.textContent = money(roomTotal(project, room));
    });
    setHeroNow(projectTotal(project)); // instant (no count-up while typing)
    renderDealGuard();                 // keep max offer / margin in sync
  }

  /* ============================================================= */
  /* MODALS / SHEETS (reusable)                                     */
  /* ============================================================= */
  // Teardown for the currently-open sheet's local listeners. Any close path
  // (button finish() or backdrop -> closeSheet) runs this so listeners can't leak.
  let sheetCleanup = null;
  function openSheet(html) {
    if (sheetCleanup) { sheetCleanup(); sheetCleanup = null; }
    el.sheet.innerHTML = html;
    // Keep the title pinned; move the rest of the body into a scroll container
    // so tall sheets (Settings, Photos) scroll without hiding the title.
    const title = el.sheet.querySelector('.sheet__title');
    const scroll = document.createElement('div');
    scroll.className = 'sheet__scroll';
    let node = title ? title.nextSibling : el.sheet.firstChild;
    while (node) {
      const next = node.nextSibling;
      scroll.appendChild(node);
      node = next;
    }
    // Always-visible header: title on the left, a ✕ close button on the right.
    if (title) {
      const head = document.createElement('div');
      head.className = 'sheet__head';
      el.sheet.insertBefore(head, title);
      head.appendChild(title);
      head.insertAdjacentHTML('beforeend',
        '<button class="sheet__close tap" data-action="sheet-close" aria-label="Close">\u2715</button>');
    }
    el.sheet.appendChild(scroll);
    el.overlay.classList.add('overlay--open');
  }
  function closeSheet() {
    if (sheetCleanup) { sheetCleanup(); sheetCleanup = null; }
    el.overlay.classList.remove('overlay--open');
    el.sheet.innerHTML = '';
  }

  // Promise-based text prompt (clean replacement for window.prompt on mobile).
  function promptText(opts) {
    return new Promise(function (resolve) {
      openSheet([
        '<h2 class="sheet__title">', esc(opts.title), '</h2>',
        '<label class="sheet__label">', esc(opts.label || 'Name'), '</label>',
        '<input class="field" id="prompt-input" type="text" value="', esc(opts.value || ''), '" ',
          'placeholder="', esc(opts.placeholder || ''), '" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" />',
        '<div class="sheet__actions">',
          '<button class="btn btn--ghost tap" data-action="prompt-cancel">Cancel</button>',
          '<button class="btn btn--primary tap" data-action="prompt-ok">', esc(opts.ok || 'Save'), '</button>',
        '</div>',
      ].join(''));
      const input = document.getElementById('prompt-input');
      input.focus();
      // Move cursor to end for rename UX.
      const val = input.value; input.value = ''; input.value = val;

      function finish(result) {
        el.sheet.removeEventListener('click', onClick);
        input.removeEventListener('keydown', onKey);
        closeSheet();
        resolve(result);
      }
      function onClick(e) {
        const act = e.target.closest('[data-action]');
        if (!act) return;
        if (act.dataset.action === 'prompt-ok') finish(input.value.trim());
        if (act.dataset.action === 'prompt-cancel') finish(null);
      }
      function onKey(e) { if (e.key === 'Enter') finish(input.value.trim()); }
      el.sheet.addEventListener('click', onClick);
      input.addEventListener('keydown', onKey);
      sheetCleanup = function () {
        el.sheet.removeEventListener('click', onClick);
        input.removeEventListener('keydown', onKey);
      };
    });
  }

  function confirmDialog(opts) {
    return new Promise(function (resolve) {
      openSheet([
        '<h2 class="sheet__title">', esc(opts.title), '</h2>',
        '<p style="margin:0 0 16px;color:var(--ink-soft)">', esc(opts.message || ''), '</p>',
        '<div class="sheet__actions">',
          '<button class="btn btn--ghost tap" data-action="confirm-cancel">', esc(opts.cancel || 'Cancel'), '</button>',
          '<button class="btn ', (opts.danger ? 'btn--danger' : 'btn--primary'), ' tap" data-action="confirm-ok">', esc(opts.ok || 'OK'), '</button>',
        '</div>',
      ].join(''));
      function finish(result) { el.sheet.removeEventListener('click', onClick); closeSheet(); resolve(result); }
      function onClick(e) {
        const act = e.target.closest('[data-action]');
        if (!act) return;
        if (act.dataset.action === 'confirm-ok') finish(true);
        if (act.dataset.action === 'confirm-cancel') finish(false);
      }
      el.sheet.addEventListener('click', onClick);
      sheetCleanup = function () { el.sheet.removeEventListener('click', onClick); };
    });
  }

  function openProjectsSheet() {
    // Current project pinned first; the rest ordered by most recently updated.
    const ids = Object.keys(state.projects).sort(function (a, b) {
      if (a === state.activeProjectId) return -1;
      if (b === state.activeProjectId) return 1;
      return state.projects[b].updatedAt - state.projects[a].updatedAt;
    });
    const rows = ids.map(function (id) {
      const p = state.projects[id];
      const active = id === state.activeProjectId;
      const roomCount = p.rooms.length;
      return [
        '<div class="proj-row ', active ? 'proj-row--active' : '', '">',
          '<button class="proj-row__main tap" data-action="switch-project" data-id="', id, '">',
            '<div class="proj-row__name">', esc(p.name),
              (active ? ' <span class="tag tag--current">Current</span>' : ''), '</div>',
            '<div class="proj-row__meta">', roomCount, ' room', (roomCount === 1 ? '' : 's'),
              ' · <span class="tnum">', money(projectTotal(p)), '</span></div>',
          '</button>',
          '<button class="mini-btn tap" data-action="edit-notes" data-id="', id, '">Notes</button>',
          '<button class="mini-btn tap" data-action="rename-project" data-id="', id, '">Rename</button>',
          '<button class="mini-btn mini-btn--danger tap" data-action="delete-project" data-id="', id, '">Delete</button>',
        '</div>',
      ].join('');
    }).join('');
    openSheet([
      '<h2 class="sheet__title">Projects</h2>',
      '<div class="proj-list">', rows, '</div>',
      '<button class="btn btn--primary tap" data-action="new-project" style="width:100%">+ New estimate</button>',
      '<hr class="divider" />',
      '<p class="hint">Each project keeps its own rooms, selections, and photos. The app reopens to your last active project.</p>',
    ].join(''));

  // New-project wizard — captures meta up front to power quantity suggestions.
  function openNewProjectSheet() {
    openSheet([
      '<h2 class="sheet__title">New estimate</h2>',
      '<label class="sheet__label">Property name / address</label>',
      '<input class="field" id="np-name" type="text" placeholder="e.g. 118 Oak Ave" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" />',
      '<label class="sheet__label">Square footage (powers quantity suggestions)</label>',
      '<input class="field tnum" id="np-sqft" type="text" inputmode="numeric" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" placeholder="e.g. 1400" />',
      '<div style="display:flex;gap:12px">',
        '<div style="flex:1"><label class="sheet__label">Beds</label><input class="field tnum" id="np-beds" type="text" inputmode="numeric" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" placeholder="3" /></div>',
        '<div style="flex:1"><label class="sheet__label">Baths</label><input class="field tnum" id="np-baths" type="text" inputmode="numeric" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" placeholder="2" /></div>',
      '</div>',
      '<label class="sheet__label">ARV — after-repair value (optional)</label>',
      '<input class="field tnum" id="np-arv" type="text" inputmode="numeric" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" placeholder="e.g. 220000" />',
      '<div class="sheet__actions">',
        '<button class="btn btn--ghost tap" data-action="np-cancel">Cancel</button>',
        '<button class="btn btn--primary tap" data-action="np-create">Create</button>',
      '</div>',
      '<p class="hint" style="margin-top:8px">Beds &amp; baths pre-create that many room instances. Everything is editable later.</p>',
    ].join(''));
    document.getElementById('np-name').focus();
    function num(id) { const v = document.getElementById(id).value.trim(); return v === '' ? null : Math.max(0, parseFloat(v) || 0); }
    function finish() { el.sheet.removeEventListener('click', onClick); closeSheet(); }
    function onClick(e) {
      const act = e.target.closest('[data-action]');
      if (!act) return;
      if (act.dataset.action === 'np-cancel') { finish(); return; }
      if (act.dataset.action === 'np-create') {
        const name = document.getElementById('np-name').value.trim();
        if (!name) { document.getElementById('np-name').focus(); return; }
        const meta = { sqft: num('np-sqft'), beds: num('np-beds'), baths: num('np-baths'), arv: num('np-arv') };
        createProject(name, meta);
        finish();
        render();
      }
    }
    el.sheet.addEventListener('click', onClick);
    sheetCleanup = function () { el.sheet.removeEventListener('click', onClick); };
  }

  function openNotesSheet(id) {
    const proj = state.projects[id];
    openSheet([
      '<h2 class="sheet__title">Notes</h2>',
      '<label class="sheet__label">Walkthrough notes for ', esc(proj.name), '</label>',

      '<div class="sheet__actions">',

        '<button class="btn btn--primary tap" data-action="notes-save">Save</button>',
      '</div>',
    ].join(''));
    document.getElementById('notes-input').focus();
    function finish() { el.sheet.removeEventListener('click', onClick); }
    function onClick(e) {
      const act = e.target.closest('[data-action]');
      if (!act) return;
      if (act.dataset.action === 'notes-cancel') { finish(); openProjectsSheet(); return; }
      if (act.dataset.action === 'notes-save') {
        proj.notes = document.getElementById('notes-input').value;
        touch(proj); saveNow(); finish(); openProjectsSheet();
        toast('Notes saved.');
      }
    }
    el.sheet.addEventListener('click', onClick);
    sheetCleanup = function () { el.sheet.removeEventListener('click', onClick); };
  }

  function openRoomTypeSheet() {
    const grid = ROOM_TYPE_ORDER.map(function (type) {
      return '<button class="type-btn tap" data-action="add-room-type" data-type="' + type + '">' +
        esc(ROOM_TYPES[type].name) + '</button>';
    }).join('');
    openSheet([
      '<h2 class="sheet__title">Add a room</h2>',
      '<div class="type-grid">', grid, '</div>',
      '<button class="btn btn--ghost tap" data-action="sheet-close" style="width:100%">Cancel</button>',
    ].join(''));
